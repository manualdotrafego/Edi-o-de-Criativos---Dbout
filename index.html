<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Criativos — Dbout</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #21253a;
    --border: #2a2f45;
    --pink: #ff69b4;
    --pink-dim: #ff69b430;
    --green: #22c55e;
    --green-dim: #22c55e20;
    --blue: #3b82f6;
    --blue-dim: #3b82f620;
    --yellow: #f59e0b;
    --yellow-dim: #f59e0b20;
    --purple: #a855f7;
    --purple-dim: #a855f720;
    --orange: #f97316;
    --orange-dim: #f9731620;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-mid: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; }

  /* TOP BAR */
  .topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar h1 { font-size: 18px; font-weight: 700; color: var(--pink); letter-spacing: -0.3px; }
  .topbar h1 span { color: var(--text-mid); font-weight: 400; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .last-update { font-size: 12px; color: var(--text-dim); }
  .badge-live { background: var(--green); color: #000; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 99px; letter-spacing: 0.5px; }

  /* SEARCH */
  .search-bar { padding: 20px 32px 0; }
  .search-input { width: 100%; max-width: 480px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; color: var(--text); font-size: 14px; outline: none; transition: border-color .2s; }
  .search-input:focus { border-color: var(--pink); }
  .search-input::placeholder { color: var(--text-dim); }

  /* STATS CARDS */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; padding: 20px 32px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .stat-card.pink::before { background: var(--pink); }
  .stat-card.green::before { background: var(--green); }
  .stat-card.blue::before { background: var(--blue); }
  .stat-card.yellow::before { background: var(--yellow); }
  .stat-card.purple::before { background: var(--purple); }
  .stat-card.orange::before { background: var(--orange); }
  .stat-number { font-size: 32px; font-weight: 800; line-height: 1; }
  .stat-card.pink .stat-number  { color: var(--pink); }
  .stat-card.green .stat-number { color: var(--green); }
  .stat-card.blue .stat-number  { color: var(--blue); }
  .stat-card.yellow .stat-number{ color: var(--yellow); }
  .stat-card.purple .stat-number{ color: var(--purple); }
  .stat-card.orange .stat-number{ color: var(--orange); }
  .stat-label { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
  .stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  /* GESTOR SECTIONS */
  .sections { padding: 8px 32px 32px; display: flex; flex-direction: column; gap: 24px; }

  .gestor-section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .gestor-header { padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; border-bottom: 1px solid var(--border); transition: background .15s; }
  .gestor-header:hover { background: var(--card2); }
  .gestor-name { display: flex; align-items: center; gap: 12px; }
  .gestor-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; flex-shrink: 0; }
  .gestor-title { font-size: 16px; font-weight: 700; }
  .gestor-subtitle { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .gestor-right { display: flex; align-items: center; gap: 16px; }
  .progress-wrap { display: flex; align-items: center; gap: 10px; }
  .progress-bar { width: 120px; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }
  .progress-pct { font-size: 13px; font-weight: 700; }
  .chevron { color: var(--text-dim); font-size: 18px; transition: transform .2s; }
  .gestor-section.collapsed .chevron { transform: rotate(-90deg); }

  /* CLINIC GRID */
  .clinics-grid { padding: 20px 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .gestor-section.collapsed .clinics-grid { display: none; }

  .clinic-card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; transition: border-color .15s, transform .1s; cursor: default; }
  .clinic-card:hover { transform: translateY(-1px); }
  .clinic-card.has-video { border-color: var(--green); background: var(--green-dim); }
  .clinic-card.has-video:hover { border-color: #4ade80; }

  .clinic-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .clinic-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .video-badge { background: var(--green); color: #000; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }

  .clinic-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .meta-chip { font-size: 10px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
  .meta-chip.on { background: #22c55e20; color: var(--green); }
  .meta-chip.off { background: #ef444420; color: #ef4444; }
  .meta-chip.consultor { background: var(--blue-dim); color: var(--blue); }
  .meta-chip.ca { background: var(--yellow-dim); color: var(--yellow); }
  .meta-chip.valor { background: var(--purple-dim); color: var(--purple); }

  .templates-list { margin-top: 6px; }
  .templates-title { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
  .templates-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tpl-tag { font-size: 10px; background: var(--card2); border: 1px solid var(--border); color: var(--text-mid); padding: 2px 6px; border-radius: 5px; }

  /* COLORS PER GESTOR */
  .color-thiago   { --g-color: #3b82f6; --g-bg: #3b82f620; }
  .color-igor     { --g-color: #a855f7; --g-bg: #a855f720; }
  .color-gustavo-m{ --g-color: #f59e0b; --g-bg: #f59e0b20; }
  .color-gustavo-b{ --g-color: #f97316; --g-bg: #f9731620; }
  .color-giovanni { --g-color: #22c55e; --g-bg: #22c55e20; }
  .color-sem      { --g-color: #64748b; --g-bg: #64748b20; }

  .gestor-avatar { background: var(--g-bg); color: var(--g-color); }
  .progress-fill { background: var(--g-color); }
  .progress-pct  { color: var(--g-color); }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* FOOTER */
  .footer { text-align: center; padding: 16px; color: var(--text-dim); font-size: 12px; border-top: 1px solid var(--border); }

  @media (max-width: 600px) {
    .topbar, .stats, .sections, .search-bar { padding-left: 16px; padding-right: 16px; }
    .clinics-grid { grid-template-columns: 1fr; padding: 16px; }
    .progress-wrap { display: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>🎬 Criativos Dentais <span>— Dbout</span></h1>
  <div class="topbar-right">
    <span class="last-update" id="last-update">Carregando...</span>
    <span class="badge-live">LIVE</span>
  </div>
</div>

<div class="search-bar">
  <input class="search-input" type="text" id="search" placeholder="🔍  Buscar clínica, cidade ou gestor..." oninput="filterAll()">
</div>

<div class="stats" id="stats-container"></div>
<div class="sections" id="sections-container"></div>

<div class="footer" id="footer">Dbout © 2026 — Atualizado automaticamente via pipeline</div>

<script>
const COLORS = {
  "Thiago Braga":   { cls: "color-thiago",    icon: "TB" },
  "Igor Teixeira":  { cls: "color-igor",       icon: "IT" },
  "Gustavo Motta":  { cls: "color-gustavo-m",  icon: "GM" },
  "Gustavo Bueno":  { cls: "color-gustavo-b",  icon: "GB" },
  "Giovanni Azzi":  { cls: "color-giovanni",   icon: "GA" },
  "Sem Gestor":     { cls: "color-sem",        icon: "??" },
};

const STAT_COLORS = ["pink","green","blue","yellow","purple","orange"];

let globalData = null;

async function loadData() {
  try {
    const r = await fetch('dashboard_criativos_data.json?t=' + Date.now());
    globalData = await r.json();
    render(globalData);
  } catch(e) {
    document.getElementById('sections-container').innerHTML =
      '<div style="padding:40px;text-align:center;color:#ef4444">Erro ao carregar dados: ' + e.message + '</div>';
  }
}

function render(data) {
  document.getElementById('last-update').textContent = '⏱ ' + data.ultima_atualizacao;

  // STATS
  const totalTemplates = data.videos_log.reduce((a,v) => a + v.templates.length, 0);
  const gestorList = Object.keys(data.gestores).filter(g => g !== 'Sem Gestor');
  const statsHTML = [
    { n: data.total_clinicas,   label: "Clínicas no DB",       sub: "base total",        color: "blue" },
    { n: data.total_com_video,  label: "Clínicas com Vídeo",   sub: `${((data.total_com_video/data.total_clinicas)*100).toFixed(0)}% do total`, color: "green" },
    { n: data.total_clinicas - data.total_com_video, label: "Aguardando Vídeo", sub: "a produzir", color: "pink" },
    { n: totalTemplates,        label: "Total de Vídeos",       sub: "templates gerados", color: "yellow" },
    { n: gestorList.length,     label: "Gestores",              sub: "de tráfego",        color: "purple" },
    { n: data.videos_log.length,label: "Cidades Atendidas",     sub: "com ao menos 1 vídeo", color: "orange" },
  ].map((s,i) => `
    <div class="stat-card ${s.color}">
      <div class="stat-number">${s.n}</div>
      <div class="stat-label">${s.label}</div>
      <div class="stat-sub">${s.sub}</div>
    </div>
  `).join('');
  document.getElementById('stats-container').innerHTML = statsHTML;

  // SECTIONS
  const order = ["Thiago Braga","Igor Teixeira","Gustavo Motta","Gustavo Bueno","Giovanni Azzi","Sem Gestor"];
  let sectionsHTML = '';

  for (const gestor of order) {
    const clinicas = data.gestores[gestor];
    if (!clinicas) continue;
    const c = COLORS[gestor] || { cls: "color-sem", icon: "??" };
    const comVideo = clinicas.filter(c => c.tem_video).length;
    const pct = Math.round((comVideo / clinicas.length) * 100);

    const clinicsHTML = clinicas.map(cl => {
      const hasVideo = cl.tem_video;
      const tpls = cl.videos.flatMap(v => v.templates);
      const uniqueTpls = [...new Set(tpls)];

      return `
        <div class="clinic-card ${hasVideo ? 'has-video' : ''}" data-name="${cl.clinica.toLowerCase()}" data-gestor="${gestor.toLowerCase()}">
          <div class="clinic-top">
            <div class="clinic-name">${cl.clinica}</div>
            ${hasVideo ? `<span class="video-badge">▶ ${uniqueTpls.length} vídeo${uniqueTpls.length>1?'s':''}</span>` : ''}
          </div>
          <div class="clinic-meta">
            <span class="meta-chip ${cl.status === 'ON' ? 'on' : 'off'}">${cl.status || '—'}</span>
            ${cl.consultor ? `<span class="meta-chip consultor">📋 ${cl.consultor}</span>` : ''}
            ${cl.ca ? `<span class="meta-chip ca">📁 ${cl.ca.split(' - ')[0]}</span>` : ''}
            ${cl.valor ? `<span class="meta-chip valor">💰 ${cl.valor}</span>` : ''}
          </div>
          ${hasVideo ? `
            <div class="templates-list">
              <div class="templates-title">Templates gerados:</div>
              <div class="templates-tags">
                ${uniqueTpls.map(t => `<span class="tpl-tag">${t}</span>`).join('')}
              </div>
            </div>` : ''}
        </div>`;
    }).join('');

    sectionsHTML += `
      <div class="gestor-section ${c.cls}" id="section-${gestor.replace(/\s/g,'-')}">
        <div class="gestor-header" onclick="toggleSection(this)">
          <div class="gestor-name">
            <div class="gestor-avatar">${c.icon}</div>
            <div>
              <div class="gestor-title">${gestor}</div>
              <div class="gestor-subtitle">${clinicas.length} clínicas · ${comVideo} com vídeo</div>
            </div>
          </div>
          <div class="gestor-right">
            <div class="progress-wrap">
              <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
              <span class="progress-pct">${pct}%</span>
            </div>
            <span class="chevron">▾</span>
          </div>
        </div>
        <div class="clinics-grid">${clinicsHTML}</div>
      </div>`;
  }

  document.getElementById('sections-container').innerHTML = sectionsHTML;
}

function toggleSection(header) {
  header.parentElement.classList.toggle('collapsed');
}

function filterAll() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  document.querySelectorAll('.clinic-card').forEach(card => {
    const match = !q || card.dataset.name.includes(q) || card.dataset.gestor.includes(q) ||
                  card.textContent.toLowerCase().includes(q);
    card.classList.toggle('hidden', !match);
  });
  // show/hide sections
  document.querySelectorAll('.gestor-section').forEach(sec => {
    const visible = [...sec.querySelectorAll('.clinic-card')].some(c => !c.classList.contains('hidden'));
    sec.classList.toggle('hidden', !visible);
    if (q && visible) sec.classList.remove('collapsed');
  });
}

// Auto-refresh every 30s
loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
